services:
  # ─────────────────────────────────────────────
  # LuckyClaw Agent (one-shot query)
  #   docker compose run --rm luckyclaw-agent -m "Hello"
  # ─────────────────────────────────────────────
  luckyclaw-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: luckyclaw-agent
    profiles:
      - agent
    volumes:
      - ./config/config.json:/root/.luckyclaw/config.json:ro
      - luckyclaw-workspace:/root/.luckyclaw/workspace
    entrypoint: ["luckyclaw", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # LuckyClaw Gateway (Long-running Bot)
  #   docker compose up luckyclaw-gateway
  # ─────────────────────────────────────────────
  luckyclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: luckyclaw-gateway
    restart: unless-stopped
    profiles:
      - gateway
    volumes:
      # Configuration file
      - ./config/config.json:/root/.luckyclaw/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - luckyclaw-workspace:/root/.luckyclaw/workspace
    command: ["gateway"]

volumes:
  luckyclaw-workspace:
